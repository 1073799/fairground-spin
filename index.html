document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:Bungee,cursive;font-size:22px;color:#20120a;\">Admin · Verlauf<\u002Fdiv>\n          <button onclick=\"{{ onCloseAdmin }}\" aria-label=\"schließen\" style=\"border:none;background:transparent;color:#8a7a5c;font-size:24px;font-weight:900;cursor:pointer;line-height:1;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;font-weight:700;color:#7a6b4d;margin-bottom:16px;\">{{ adminCount }} gespeicherte Entscheidung(en) · alle Fragen &amp; Ergebnisse<\u002Fdiv>\n\n        <sc-if value=\"{{ hasLog }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px;\">\n            <sc-for list=\"{{ logView }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start;background:#fffdf7;border:2px solid #e6d8bf;border-radius:13px;padding:11px 13px;\">\n                <span style=\"font-size:22px;line-height:1;flex:none;margin-top:1px;\">{{ r.emoji }}<\u002Fspan>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-weight:800;font-size:14px;color:#5a4a30;line-height:1.3;\">{{ r.question }}<\u002Fdiv>\n                  <div style=\"font-family:Bungee,cursive;font-size:16px;color:#c0392b;margin-top:3px;\">{{ r.label }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-size:12px;font-weight:700;color:#a8977a;white-space:nowrap;margin-top:2px;\">{{ r.when }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ onClearLog }}\" style=\"margin-top:18px;align-self:flex-start;border:2px solid #c0392b;background:transparent;color:#c0392b;border-radius:11px;padding:9px 16px;font-weight:900;font-size:13px;cursor:pointer;\">Verlauf löschen<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noLog }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:14px;font-weight:600;color:#8a7a5c;padding:24px 0;text-align:center;\">Noch keine Entscheidungen gespeichert. Dreh das Rad! 🎡<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <canvas ref=\"{{ confettiRef }}\" style=\"position:fixed;inset:0;z-index:60;pointer-events:none;width:100%;height:100%;\"><\u002Fcanvas>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:880},&quot;spinDurationSec&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:2,&quot;max&quot;:9,&quot;tsType&quot;:&quot;number&quot;},&quot;showWheelLabels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;bulbTwinkle&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;confettiOn&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.palette = ['#E63946','#F77F00','#FCBF49','#06A77D','#118AB2','#3A86FF','#8338EC','#FF6392','#2EC4B6','#9BC53D','#EF476F','#FFB703'];\n    const seed = [];\n    this.colorCount = seed.length;\n    this.state = {\n      question: '',\n      answers: seed,\n      draft: '',\n      spinning: false,\n      showResult: false,\n      result: null,\n      resultQuestion: '',\n      soundOn: true,\n      log: this.loadLog(),\n      online: false,\n      roomCode: '',\n      showAdmin: false,\n      showShare: false,\n      qrDataUrl: '',\n      shareUrl: '',\n      copied: false,\n      pickerFor: null,\n    };\n    this.clientId = Math.random().toString(36).slice(2);\n    this.cfg = window.FAIRGROUND_CONFIG || {};\n    this.roomCode = this.getRoomFromUrl() || 'main';\n    this._seenResults = {};\n    this.wheelRef = React.createRef();\n    this.wheelGlowRef = React.createRef();\n    this.cloverRef = React.createRef();\n    this.confettiRef = React.createRef();\n    this.rotation = 0;\n    this._segs = [];\n    this._confetti = [];\n    this._confettiRaf = null;\n  }\n\n  componentDidMount() {\n    this.sizeConfetti();\n    this._onResize = () => this.sizeConfetti();\n    window.addEventListener('resize', this._onResize);\n    this.genQR();\n    this.initSync();\n  }\n  genQR(tries) {\n    tries = tries || 0;\n    const url = (window.location && window.location.href) || '';\n    if (window.qrcode) {\n      try {\n        let qr;\n        try { qr = window.qrcode(0, 'M'); qr.addData(url); qr.make(); }\n        catch (e) { qr = window.qrcode(0, 'L'); qr.addData(url); qr.make(); }\n        this.setState({ qrDataUrl: qr.createDataURL(7, 4), shareUrl: url });\n      } catch (e) { this.setState({ shareUrl: url }); }\n    } else if (tries < 40) {\n      setTimeout(() => this.genQR(tries + 1), 100);\n    } else {\n      this.setState({ shareUrl: url });\n    }\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._confettiRaf) cancelAnimationFrame(this._confettiRaf);\n  }\n\n  // ---- persistence ----\n  loadLog() {\n    try { return JSON.parse(localStorage.getItem('gluecksrad_log')) || []; }\n    catch (e) { return []; }\n  }\n  saveLog(log) {\n    try { localStorage.setItem('gluecksrad_log', JSON.stringify(log)); } catch (e) {}\n  }\n\n  // ---- supabase live-sync ----\n  getRoomFromUrl() {\n    try { return new URL(window.location.href).searchParams.get('room'); } catch (e) { return null; }\n  }\n  makeCode() {\n    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';\n    let s = '';\n    for (let i = 0; i < 5; i++) s += c[Math.floor(Math.random() * c.length)];\n    return s;\n  }\n  newRoom() {\n    const code = this.makeCode();\n    const u = new URL(window.location.href);\n    u.searchParams.set('room', code);\n    window.location.href = u.toString();\n  }\n  async initSync() {\n    const cfg = this.cfg || {};\n    if (!cfg.url || !cfg.anonKey || !/^https?:\\/\\//.test(cfg.url)) return; // -> local mode\n    let tries = 0;\n    while ((!window.supabase || !window.supabase.createClient) && tries < 60) {\n      await new Promise(r => setTimeout(r, 100)); tries++;\n    }\n    if (!window.supabase || !window.supabase.createClient) return;\n    try {\n      this.sb = window.supabase.createClient(cfg.url, cfg.anonKey);\n      const code = this.roomCode;\n      const row = await this.ensureRoom(code);\n      if (row) this.applyRoom(row);\n      await this.loadResults(code);\n      this.ch = this.sb.channel('fairground-' + code, { config: { broadcast: { self: false } } });\n      this.ch\n        .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms', filter: 'id=eq.' + code }, p => this.applyRoom(p.new))\n        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'results', filter: 'room_id=eq.' + code }, p => this.addResult(p.new))\n        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'results', filter: 'room_id=eq.' + code }, () => this.reloadResultsSoon())\n        .on('broadcast', { event: 'spin' }, ({ payload }) => { if (payload && payload.by !== this.clientId) this.runSpinTo(payload.winnerId, false); })\n        .subscribe((status) => { if (status === 'SUBSCRIBED') this.setState({ online: true, roomCode: code }); });\n    } catch (e) { /* stay in local mode */ }\n  }\n  async ensureRoom(code) {\n    const { data, error } = await this.sb.from('rooms').select('*').eq('id', code).maybeSingle();\n    if (error) throw error;\n    if (data) return data;\n    const seed = this.state.answers;\n    const ins = await this.sb.from('rooms').insert({ id: code, question: this.state.question, options: seed }).select().maybeSingle();\n    if (ins.error) throw ins.error;\n    return ins.data || { id: code, question: this.state.question, options: seed };\n  }\n  applyRoom(row) {\n    if (!row) return;\n    const active = document.activeElement;\n    const editingLabel = active && active.tagName === 'INPUT' && active.placeholder === 'Option…';\n    const editingQuestion = active && active.dataset && active.dataset.qfield === '1';\n    const patch = {};\n    if (Array.isArray(row.options) && !editingLabel) patch.answers = row.options;\n    if (typeof row.question === 'string' && !editingQuestion) patch.question = row.question;\n    if (Object.keys(patch).length) this.setState(patch);\n  }\n  pushRoom() {\n    if (!this.online && !this.sb) return;\n    if (!this.sb) return;\n    clearTimeout(this._pushT);\n    this._pushT = setTimeout(() => {\n      this.sb.from('rooms').update({\n        question: this.state.question,\n        options: this.state.answers,\n        updated_at: new Date().toISOString(),\n      }).eq('id', this.roomCode).then(() => {}, () => {});\n    }, 220);\n  }\n  mapResult(r) {\n    return { id: r.id, question: r.question, label: r.label, emoji: r.emoji, color: r.color, ts: r.created_at ? Date.parse(r.created_at) : Date.now() };\n  }\n  async loadResults(code) {\n    const { data } = await this.sb.from('results').select('*').eq('room_id', code).order('created_at', { ascending: false }).limit(300);\n    if (data) {\n      this._seenResults = {};\n      data.forEach(r => { this._seenResults[r.id] = 1; });\n      this.setState({ log: data.map(r => this.mapResult(r)) });\n    }\n  }\n  addResult(r) {\n    if (!r || this._seenResults[r.id]) return;\n    this._seenResults[r.id] = 1;\n    this.setState(s => ({ log: [this.mapResult(r), ...s.log].slice(0, 300) }));\n  }\n  reloadResultsSoon() {\n    clearTimeout(this._reloadT);\n    this._reloadT = setTimeout(() => { if (this.sb) this.loadResults(this.roomCode); }, 200);\n  }\n  insertResult(winner) {\n    if (!this.sb) return;\n    this.sb.from('results').insert({\n      room_id: this.roomCode,\n      question: this.state.question,\n      label: winner.label,\n      emoji: winner.emoji || this.displayEmoji(winner),\n      color: winner.color,\n    }).then(() => {}, () => {});\n  }\n  clearResultsRemote() {\n    if (!this.sb) return;\n    this._seenResults = {};\n    this.sb.from('results').delete().eq('room_id', this.roomCode).then(() => {}, () => {});\n    this.setState({ log: [] });\n  }\n\n  // ---- emoji ----\n  emojiChoices() {\n    return ['🍕','🍝','🥗','🍔','🍣','🌮','🍟','🍲','🍚','🍦','🍰','🍫','☕','🍺','🍷','🥤',\n      '🎬','📺','🎮','⚽','🏀','🎾','🏃','🧘','🏋️','🚴','🎵','💃','📚','✈️','🏖️','🏔️',\n      '🎉','🛍️','😴','🏠','🐶','🐱','🚗','🎯','⭐','🎲','🔥','🍀','🎈','🌈','⚡','🚀',\n      '✅','❌','🤔','💰','🎁','🌸','☀️','❄️'];\n  }\n  getEmoji(label) {\n    const t = (label || '').toLowerCase().trim();\n    if (!t) return this.fallbackEmoji(t);\n    // split into words, keeping german umlauts/ß as word chars\n    const words = t.split(/[^0-9a-zàâäçéèêëîïôöùûüÿñæœß]+/i).filter(Boolean);\n    // a keyword matches if: (phrase) substring; or whole word; or word starts with a >=4-char stem; or a >=5-char stem sits inside a compound word\n    const has = (k) => {\n      if (k.indexOf(' ') >= 0) return t.indexOf(k) >= 0;\n      if (words.indexOf(k) >= 0) return true;\n      if (k.length >= 4 && words.some(w => w.indexOf(k) === 0)) return true;\n      if (k.length >= 5 && words.some(w => w.indexOf(k) >= 0)) return true;\n      return false;\n    };\n    // ordered most-specific first; conflict-prone short stems kept whole-word only;\n    // 'reise' (travel) sits BEFORE 'reis' (rice) so \"Reise\" never reads as rice\n    const map = [\n      [['pizza'], '🍕'], [['spaghetti', 'spagh', 'pasta', 'nudel', 'nudeln', 'lasagne'], '🍝'],\n      [['sushi', 'maki'], '🍣'], [['taco', 'tacos', 'burrito'], '🌮'],\n      [['döner', 'doener', 'kebab', 'dürüm', 'duerum'], '🥙'], [['burger', 'hamburger', 'cheeseburger'], '🍔'],\n      [['pommes', 'fries', 'fritten'], '🍟'], [['sandwich', 'sandwiches', 'toast', 'baguette'], '🥪'],\n      [['suppe', 'soup', 'eintopf', 'ramen'], '🍲'], [['curry'], '🍛'], [['wrap', 'wraps'], '🌯'],\n      [['brot', 'brötchen', 'broetchen', 'bread', 'semmel'], '🥖'], [['käse', 'kaese', 'cheese'], '🧀'],\n      [['fisch', 'fish', 'lachs', 'thunfisch'], '🐟'], [['steak', 'fleisch', 'rind', 'beef', 'schnitzel'], '🥩'],\n      [['hähnchen', 'haehnchen', 'huhn', 'hühnchen', 'chicken'], '🍗'],\n      [['salat', 'salad', 'salate'], '🥗'], [['popcorn'], '🍿'], [['donut', 'donuts'], '🍩'],\n      [['keks', 'kekse', 'cookie', 'cookies', 'plätzchen', 'plaetzchen'], '🍪'],\n      [['schoko', 'schokolade', 'chocolate', 'praline'], '🍫'], [['kuchen', 'cake', 'torte', 'muffin'], '🍰'],\n      [['eis', 'eisdiele', 'eiscreme', 'gelato', 'ice cream', 'icecream'], '🍦'],\n      [['apfel', 'äpfel', 'apple'], '🍎'], [['banane', 'banana'], '🍌'], [['ei', 'eier', 'egg', 'eggs'], '🥚'],\n      [['kaffee', 'coffee', 'espresso', 'cappuccino', 'cappu', 'latte'], '☕'], [['tee', 'tea', 'chai'], '🍵'],\n      [['bier', 'beer', 'pils'], '🍺'], [['wein', 'wine', 'rotwein', 'weißwein'], '🍷'],\n      [['cocktail', 'cocktails', 'drink', 'drinks'], '🍸'], [['saft', 'juice', 'smoothie', 'limo', 'limonade'], '🥤'],\n      [['wasser', 'water'], '💧'],\n      [['kino', 'film', 'filme', 'movie', 'movies', 'cinema'], '🎬'],\n      [['serie', 'serien', 'netflix', 'fernsehen', 'fernseh', 'tv'], '📺'],\n      [['brettspiel', 'brettspiele', 'puzzle'], '🧩'],\n      [['videospiel', 'gaming', 'zocken', 'zock', 'konsole', 'playstation', 'xbox', 'spielen', 'spiel'], '🎮'],\n      [['fußball', 'fussball', 'soccer', 'football'], '⚽'], [['basketball'], '🏀'], [['tennis'], '🎾'],\n      [['schwimmen', 'schwimm', 'swim', 'swimming', 'pool'], '🏊'],\n      [['joggen', 'jogging', 'jogg', 'laufen', 'lauf', 'running', 'marathon'], '🏃'],\n      [['yoga', 'meditation', 'meditieren', 'medit'], '🧘'],\n      [['gym', 'fitness', 'fitnessstudio', 'training', 'workout', 'krafttraining'], '🏋️'],\n      [['fahrrad', 'radfahren', 'bike', 'biken', 'cycling', 'cycle', 'rad'], '🚴'],\n      [['musik', 'music', 'song', 'songs', 'konzert', 'konzerte'], '🎵'],\n      [['tanzen', 'tanz', 'dance', 'dancing', 'disco', 'club', 'clubbing'], '💃'],\n      [['lesen', 'buch', 'bücher', 'buecher', 'book', 'books', 'roman'], '📚'],\n      [['lernen', 'studieren', 'study', 'hausaufgaben', 'hausaufgabe'], '📖'],\n      [['arbeit', 'arbeiten', 'work', 'büro', 'buero', 'job', 'meeting', 'meetings'], '💼'],\n      [['reise', 'reisen', 'travel', 'urlaub', 'flug', 'fliegen', 'flight'], '✈️'],\n      [['reis', 'rice', 'reisschüssel'], '🍚'],\n      [['strand', 'beach', 'meer', 'baden'], '🏖️'],\n      [['berg', 'berge', 'wandern', 'wanderung', 'hiking', 'hike'], '🏔️'],\n      [['camping', 'campen', 'zelt', 'zelten'], '🏕️'], [['park', 'spazieren', 'spaziergang'], '🌳'],\n      [['party', 'partys', 'feiern', 'feier', 'fest', 'festival'], '🎉'],\n      [['shopping', 'einkaufen', 'einkauf', 'shoppen'], '🛍️'],\n      [['schlafen', 'schlaf', 'sleep', 'bett', 'nickerchen', 'nap'], '😴'],\n      [['restaurant', 'essen gehen', 'auswärts', 'auswaerts'], '🍽️'], [['kneipe', 'pub', 'bar'], '🍻'],\n      [['zuhause', 'zuhaus', 'daheim', 'home'], '🏠'],\n      [['hund', 'hunde', 'dog'], '🐶'], [['katze', 'katzen', 'cat'], '🐱'],\n      [['auto', 'autofahren', 'car'], '🚗'], [['zug', 'bahn', 'train'], '🚆'],\n      [['vielleicht', 'maybe', 'evtl'], '🤔'], [['ja', 'yes', 'jep'], '✅'], [['nein', 'no', 'nope', 'nö'], '❌'],\n      [['geld', 'money', 'sparen', 'budget'], '💰'], [['geschenk', 'geschenke', 'gift', 'present'], '🎁'],\n      [['blume', 'blumen', 'flower'], '🌸'], [['sonne', 'sonnig', 'sommer', 'sun'], '☀️'],\n      [['regen', 'regnerisch', 'rain'], '🌧️'], [['schnee', 'snow', 'winter'], '❄️'],\n    ];\n    for (const [keys, emo] of map) { if (keys.some(has)) return emo; }\n    return this.fallbackEmoji(t);\n  }\n  fallbackEmoji(t) {\n    const pool = ['🎯', '⭐', '🎲', '🔥', '💫', '🍀', '🎈', '🌈', '⚡', '🎪', '🎨', '🚀'];\n    let h = 0;\n    for (let i = 0; i < t.length; i++) h = (h + t.charCodeAt(i)) % pool.length;\n    return pool[h];\n  }\n\n  // ---- geometry ----\n  point(a, r) {\n    const rad = (a * Math.PI) / 180;\n    return { x: 240 + r * Math.sin(rad), y: 240 - r * Math.cos(rad) };\n  }\n  computeSegments(answers) {\n    const active = answers.filter(a => a.votes > 0);\n    const total = active.reduce((s, a) => s + a.votes, 0);\n    if (total <= 0) return [];\n    const r = 210, lr = 134;\n    let acc = 0;\n    return active.map(a => {\n      const span = (a.votes / total) * 360;\n      const start = acc, end = acc + span; acc = end;\n      const p0 = this.point(start, r), p1 = this.point(end, r);\n      const large = span > 180 ? 1 : 0;\n      const d = `M240 240 L${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A${r} ${r} 0 ${large} 1 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} Z`;\n      const mid = (start + end) / 2;\n      const lp = this.point(mid, lr);\n      let rot = mid - 90;\n      if (mid > 90 && mid < 270) rot += 180;\n      return {\n        id: a.id, label: a.label, color: a.color, votes: a.votes, emoji: this.displayEmoji(a),\n        start, end, span, mid, d,\n        lx: +lp.x.toFixed(2), ly: +lp.y.toFixed(2),\n        labelTransform: `rotate(${rot.toFixed(2)} ${lp.x.toFixed(2)} ${lp.y.toFixed(2)})`,\n      };\n    });\n  }\n  segIndexAtTop(rot) {\n    const a = ((360 - (rot % 360)) % 360 + 360) % 360;\n    for (let i = 0; i < this._segs.length; i++) {\n      if (a >= this._segs[i].start && a < this._segs[i].end) return i;\n    }\n    return -1;\n  }\n\n  // ---- sound ----\n  ensureAudio() {\n    if (!this.actx) {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (AC) this.actx = new AC();\n    }\n    if (this.actx && this.actx.state === 'suspended') this.actx.resume();\n  }\n  flickClover() {\n    const el = this.cloverRef.current;\n    if (!el) return;\n    el.style.transition = 'none';\n    el.style.transform = 'translateX(-50%) rotate(-15deg)';\n    if (this._flickT) clearTimeout(this._flickT);\n    this._flickRaf = requestAnimationFrame(() => {\n      el.style.transition = 'transform .22s cubic-bezier(.2,1.5,.4,1)';\n      el.style.transform = 'translateX(-50%) rotate(0deg)';\n    });\n  }\n  tick() {\n    this.flickClover();\n    if (!this.state.soundOn || !this.actx) return;\n    const t = this.actx.currentTime;\n    const o = this.actx.createOscillator(), g = this.actx.createGain();\n    o.type = 'square';\n    o.frequency.value = 620 + Math.random() * 380;\n    g.gain.setValueAtTime(0.06, t);\n    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);\n    o.connect(g); g.connect(this.actx.destination);\n    o.start(t); o.stop(t + 0.06);\n  }\n  playWin() {\n    if (!this.state.soundOn || !this.actx) return;\n    const notes = [523, 659, 784, 1047];\n    notes.forEach((f, i) => {\n      const t = this.actx.currentTime + i * 0.12;\n      const o = this.actx.createOscillator(), g = this.actx.createGain();\n      o.type = 'triangle'; o.frequency.value = f;\n      g.gain.setValueAtTime(0.0001, t);\n      g.gain.linearRampToValueAtTime(0.14, t + 0.02);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);\n      o.connect(g); g.connect(this.actx.destination);\n      o.start(t); o.stop(t + 0.34);\n    });\n  }\n\n  // ---- confetti ----\n  sizeConfetti() {\n    const c = this.confettiRef.current; if (!c) return;\n    const dpr = window.devicePixelRatio || 1;\n    c.width = window.innerWidth * dpr;\n    c.height = window.innerHeight * dpr;\n    const ctx = c.getContext('2d');\n    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n  }\n  launchConfetti() {\n    const W = window.innerWidth;\n    const cols = this.palette;\n    for (let i = 0; i < 160; i++) {\n      this._confetti.push({\n        x: W / 2 + (Math.random() - 0.5) * 200,\n        y: -20 - Math.random() * 200,\n        vx: (Math.random() - 0.5) * 9,\n        vy: 2 + Math.random() * 5,\n        size: 6 + Math.random() * 8,\n        rot: Math.random() * 360,\n        vr: (Math.random() - 0.5) * 18,\n        color: cols[(Math.random() * cols.length) | 0],\n      });\n    }\n    if (!this._confettiRaf) this.drawConfetti();\n  }\n  drawConfetti() {\n    const c = this.confettiRef.current;\n    if (!c) { this._confettiRaf = null; return; }\n    const ctx = c.getContext('2d');\n    const H = window.innerHeight;\n    ctx.clearRect(0, 0, c.width, c.height);\n    this._confetti = this._confetti.filter(p => p.y < H + 40);\n    this._confetti.forEach(p => {\n      p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.99; p.rot += p.vr;\n      ctx.save();\n      ctx.translate(p.x, p.y);\n      ctx.rotate((p.rot * Math.PI) / 180);\n      ctx.fillStyle = p.color;\n      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);\n      ctx.restore();\n    });\n    if (this._confetti.length > 0) {\n      this._confettiRaf = requestAnimationFrame(() => this.drawConfetti());\n    } else {\n      ctx.clearRect(0, 0, c.width, c.height);\n      this._confettiRaf = null;\n    }\n  }\n\n  // ---- answer ops ----\n  setVotes(id, delta) {\n    this.setState(s => ({\n      answers: s.answers.map(a => a.id === id ? { ...a, votes: Math.max(0, a.votes + delta) } : a),\n    }), () => this.pushRoom());\n  }\n  removeAnswer(id) {\n    this.setState(s => ({ answers: s.answers.filter(a => a.id !== id), pickerFor: s.pickerFor === id ? null : s.pickerFor }), () => this.pushRoom());\n  }\n  renameAnswer(id, label) {\n    this.setState(s => ({ answers: s.answers.map(a => a.id === id ? { ...a, label } : a) }), () => this.pushRoom());\n  }\n  setEmoji(id, emoji) {\n    this.setState(s => ({ answers: s.answers.map(a => a.id === id ? { ...a, emoji } : a), pickerFor: null }), () => this.pushRoom());\n  }\n  clearEmoji(id) {\n    this.setState(s => ({ answers: s.answers.map(a => a.id === id ? { ...a, emoji: null } : a), pickerFor: null }), () => this.pushRoom());\n  }\n  togglePicker(id) {\n    this.setState(s => ({ pickerFor: s.pickerFor === id ? null : id }));\n  }\n  displayEmoji(a) {\n    return a.emoji || this.getEmoji(a.label);\n  }\n  addAnswer() {\n    const t = (this.state.draft || '').trim();\n    if (!t) return;\n    const color = this.palette[this.colorCount++ % this.palette.length];\n    this.setState(s => ({\n      answers: [...s.answers, { id: 'a' + Date.now() + Math.floor(Math.random() * 1000), label: t, votes: 1, color }],\n      draft: '',\n    }), () => this.pushRoom());\n  }\n\n  // ---- spin ----\n  spin() {\n    if (this.state.spinning) return;\n    const segs = this.computeSegments(this.state.answers);\n    if (segs.length < 2) return;\n    const total = segs.reduce((s, x) => s + x.votes, 0);\n    let r = Math.random() * total, winner = segs[segs.length - 1];\n    for (const s of segs) { if (r < s.votes) { winner = s; break; } r -= s.votes; }\n    if (this.online && this.ch) {\n      try { this.ch.send({ type: 'broadcast', event: 'spin', payload: { winnerId: winner.id, by: this.clientId } }); } catch (e) {}\n    }\n    this.runSpinTo(winner.id, true);\n  }\n  runSpinTo(winnerId, initiator) {\n    if (this.state.spinning) return;\n    const segs = this.computeSegments(this.state.answers);\n    if (segs.length < 1) return;\n    const winner = segs.find(x => x.id === winnerId) || segs[0];\n    this._segs = segs;\n    this.ensureAudio();\n\n    const chosenAngle = winner.start + (0.18 + 0.64 * Math.random()) * winner.span;\n    const targetMod = ((360 - chosenAngle) % 360 + 360) % 360;\n    const turns = 6;\n    const start = this.rotation;\n    const target = Math.ceil(start / 360) * 360 + turns * 360 + targetMod;\n    const dur = (this.props.spinDurationSec || 5) * 1000;\n    const t0 = performance.now();\n    this._lastTop = this.segIndexAtTop(start);\n\n    this.setState({ spinning: true, showResult: false });\n    const glow = this.wheelGlowRef.current;\n    if (glow) { glow.style.opacity = '1'; glow.style.boxShadow = '0 0 60px 22px rgba(255,210,63,.7)'; }\n\n    const step = (now) => {\n      const t = Math.min(1, (now - t0) / dur);\n      const e = 1 - Math.pow(1 - t, 4);\n      const rot = start + (target - start) * e;\n      this.rotation = rot;\n      if (this.wheelRef.current) this.wheelRef.current.style.transform = `rotate(${rot}deg)`;\n      const top = this.segIndexAtTop(rot);\n      if (top !== this._lastTop) { this.tick(); this._lastTop = top; }\n      if (t < 1) {\n        this._raf = requestAnimationFrame(step);\n      } else {\n        this.finishSpin(winner, initiator);\n      }\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n  finishSpin(winner, initiator) {\n    const glow = this.wheelGlowRef.current;\n    if (glow) { glow.style.opacity = '0'; glow.style.boxShadow = '0 0 0 0 rgba(255,210,63,0)'; }\n    this.playWin();\n    if (this.props.confettiOn !== false) this.launchConfetti();\n    if (this.online) {\n      // results table is the shared source of truth; only the initiator writes\n      if (initiator) this.insertResult(winner);\n      this.setState({ spinning: false, showResult: true, result: winner, resultQuestion: this.state.question });\n    } else {\n      this.setState(s => {\n        const record = { question: s.question, label: winner.label, color: winner.color, emoji: winner.emoji, ts: Date.now() };\n        const log = [record, ...s.log].slice(0, 300);\n        this.saveLog(log);\n        return { spinning: false, showResult: true, result: winner, resultQuestion: s.question, log };\n      });\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const segs = this.computeSegments(s.answers);\n    this._segs = segs;\n    const total = s.answers.reduce((a, x) => a + x.votes, 0);\n    const showLabels = this.props.showWheelLabels !== false;\n    const spinDisabled = s.spinning || segs.length < 2;\n\n    return {\n      question: s.question,\n      onQuestionChange: (e) => this.setState({ question: e.target.value }, () => this.pushRoom()),\n\n      online: s.online,\n      roomCode: s.roomCode || this.roomCode,\n      statusText: s.online ? ('Live · Raum ' + (s.roomCode || this.roomCode)) : 'Lokaler Modus',\n      statusDot: s.online ? '#2faf54' : '#9aa7ab',\n      statusBg: s.online ? 'rgba(47,175,84,.16)' : 'rgba(255,255,255,.06)',\n      onNewRoom: () => this.newRoom(),\n      shareHint: s.online\n        ? 'Scanne den Code oder teile den Link — alle im selben Raum stimmen gemeinsam ab. 🍀'\n        : 'Lokaler Modus: Der Link öffnet das Rad als eigene Kopie (kein geteiltes Voting). Für Live-Abstimmung Supabase einrichten — siehe README.',\n\n      answersView: s.answers.map(a => {\n        const auto = this.getEmoji(a.label);\n        const cur = this.displayEmoji(a);\n        const open = s.pickerFor === a.id;\n        return {\n          id: a.id, label: a.label, votes: a.votes, color: a.color, emoji: cur,\n          autoEmoji: auto,\n          pickerOpen: open,\n          pickerBorder: open ? '#c0392b' : '#e6d8bf',\n          onTogglePicker: () => this.togglePicker(a.id),\n          onAutoEmoji: () => this.clearEmoji(a.id),\n          emojiChoices: this.emojiChoices().map(em => ({\n            emoji: em,\n            bg: em === cur ? '#ffd23f' : '#fffdf7',\n            onPick: () => this.setEmoji(a.id, em),\n          })),\n          onLabel: (e) => this.renameAnswer(a.id, e.target.value),\n          onPlus: () => this.setVotes(a.id, 1),\n          onMinus: () => this.setVotes(a.id, -1),\n          onRemove: () => this.removeAnswer(a.id),\n        };\n      }),\n      totalVotes: total,\n      noAnswers: s.answers.length === 0,\n\n      draft: s.draft,\n      onDraftChange: (e) => this.setState({ draft: e.target.value }),\n      onDraftKey: (e) => { if (e.key === 'Enter') this.addAnswer(); },\n      onAddAnswer: () => this.addAnswer(),\n\n      segments: segs,\n      labelsEl: this.buildLabels(showLabels ? segs : []),\n      hasSegments: segs.length > 0,\n      noSegments: segs.length === 0,\n\n      bezelEl: this.buildBezel(),\n      wheelRef: this.wheelRef,\n      wheelGlowRef: this.wheelGlowRef,\n      cloverRef: this.cloverRef,\n      confettiRef: this.confettiRef,\n      hubClass: s.spinning ? 'hub-spinning' : '',\n\n      onSpin: () => this.spin(),\n      spinning: s.spinning,\n      spinDisabled,\n      hubLabel: s.spinning ? '…' : 'DREHEN',\n      hubBg: spinDisabled ? '#9aa7ab' : '#c0392b',\n      hubCursor: spinDisabled ? 'default' : 'pointer',\n\n      soundOn: s.soundOn,\n      soundLabel: s.soundOn ? '♪  Ton an' : '✕  Ton aus',\n      onToggleSound: () => this.setState(st => ({ soundOn: !st.soundOn })),\n\n      historyView: s.log.slice(0, 8).map((h, i) => ({ label: h.label, color: h.color, emoji: h.emoji || this.getEmoji(h.label), num: '#' + (s.log.length - i) })),\n      hasHistory: s.log.length > 0,\n      noHistory: s.log.length === 0,\n\n      onOpenShare: () => this.setState({ showShare: true }),\n      onCloseShare: () => this.setState({ showShare: false, copied: false }),\n      showShare: s.showShare,\n      qrDataUrl: s.qrDataUrl,\n      hasQr: !!s.qrDataUrl,\n      noQr: !s.qrDataUrl,\n      shareUrl: s.shareUrl || (window.location ? window.location.href : ''),\n      copyLabel: s.copied ? '✓ Link kopiert!' : 'Link kopieren',\n      onCopyLink: () => {\n        const u = s.shareUrl || window.location.href;\n        try { navigator.clipboard.writeText(u); } catch (e) {}\n        this.setState({ copied: true });\n        clearTimeout(this._copyT);\n        this._copyT = setTimeout(() => this.setState({ copied: false }), 1800);\n      },\n\n      onOpenAdmin: () => this.setState({ showAdmin: true }),\n      onCloseAdmin: () => this.setState({ showAdmin: false }),\n      showAdmin: s.showAdmin,\n      adminCount: s.log.length,\n      adminBadge: s.log.length ? ' · ' + s.log.length : '',\n      hasLog: s.log.length > 0,\n      noLog: s.log.length === 0,\n      logView: s.log.map(r => ({\n        question: r.question || '(ohne Frage)',\n        label: r.label,\n        color: r.color,\n        emoji: r.emoji || this.getEmoji(r.label),\n        when: this.formatWhen(r.ts),\n      })),\n      onClearLog: () => { if (this.online) { this.clearResultsRemote(); } else { this.saveLog([]); this.setState({ log: [] }); } },\n\n      showResult: s.showResult,\n      result: s.result,\n      resultLabel: s.result ? s.result.label : '',\n      resultEmoji: s.result ? (s.result.emoji || this.getEmoji(s.result.label)) : '',\n      resultColor: s.result ? s.result.color : '#ccc',\n      resultQuestion: s.resultQuestion,\n      onCloseResult: () => this.setState({ showResult: false }),\n      onSpinAgain: () => { this.setState({ showResult: false }); setTimeout(() => this.spin(), 250); },\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n\n  formatWhen(ts) {\n    if (!ts) return '';\n    const d = new Date(ts);\n    const p = n => String(n).padStart(2, '0');\n    return `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()} · ${p(d.getHours())}:${p(d.getMinutes())}`;\n  }\n  buildLabels(segs) {\n    const R = React.createElement;\n    if (!segs.length) return null;\n    return R('g', { key: 'labels' }, segs.map(seg => R('g', { key: seg.id }, [\n      R('text', {\n        key: 'e',\n        x: seg.lx, y: seg.ly - 13,\n        transform: seg.labelTransform,\n        textAnchor: 'middle', dominantBaseline: 'central',\n        style: { fontSize: '24px' },\n      }, seg.emoji),\n      R('text', {\n        key: 'l',\n        x: seg.lx, y: seg.ly + 12,\n        transform: seg.labelTransform,\n        textAnchor: 'middle', dominantBaseline: 'central',\n        fill: '#fff', stroke: 'rgba(0,0,0,.4)', strokeWidth: 3.5, paintOrder: 'stroke',\n        style: { fontFamily: 'Nunito, sans-serif', fontWeight: 900, fontSize: '16px' },\n      }, seg.label),\n    ])));\n  }\n  buildBezel() {\n    const R = React.createElement;\n    const twinkle = this.props.bulbTwinkle !== false;\n    const els = [\n      R('circle', { key: 'rim', cx: 260, cy: 260, r: 258, fill: '#7c4a12' }),\n      R('circle', { key: 'gold', cx: 260, cy: 260, r: 251, fill: '#f0b53c' }),\n      R('circle', { key: 'goldedge', cx: 260, cy: 260, r: 249, fill: 'none', stroke: '#c8881f', strokeWidth: 2 }),\n      R('circle', { key: 'inneredge', cx: 260, cy: 260, r: 226, fill: 'none', stroke: '#c8881f', strokeWidth: 2 }),\n    ];\n    const n = 20;\n    for (let i = 0; i < n; i++) {\n      const ang = (i / n) * 360 * Math.PI / 180;\n      const cx = 260 + 238 * Math.sin(ang);\n      const cy = 260 - 238 * Math.cos(ang);\n      const amber = i % 2 === 0;\n      els.push(R('circle', {\n        key: 'b' + i, cx, cy, r: 6.5,\n        fill: amber ? '#fff3c4' : '#ffd23f',\n        stroke: 'rgba(120,70,10,.45)', strokeWidth: 1,\n        style: twinkle ? { animation: `twinkle 1.4s ease-in-out ${(i % 2) * 0.7}s infinite` } : undefined,\n      }));\n    }\n    return R('svg', {\n      width: 520, height: 520, viewBox: '0 0 520 520',\n      style: { position: 'absolute', inset: 0, filter: 'drop-shadow(0 12px 26px rgba(0,0,0,.5))' },\n    }, els);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
